<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TaskbarLyrics 设置</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">♪</div>
        <div class="brand-name">TaskbarLyrics</div>
      </div>
      <nav class="nav" aria-label="设置分类">
        <button class="nav-item active" data-target="players"><span>▷</span>播放器</button>
        <button class="nav-item" data-target="lyrics"><span>Aa</span>歌词</button>
        <button class="nav-item" data-target="appearance"><span>▧</span>外观</button>
        <button class="nav-item" data-target="layout"><span>▦</span>布局</button>
        <button class="nav-item" data-target="debug"><span>⌕</span>调试</button>
      </nav>
    </aside>

    <section class="content">
      <header class="page-header">
        <div>
          <h1>设置</h1>
          <p>调整播放器识别、歌词显示、外观和任务栏布局。</p>
        </div>
        <div class="page-icon">♫</div>
      </header>

      <section id="players" class="card">
        <div class="section-heading">
          <h2>播放器集成</h2>
          <p>选择要监听的音乐播放器，并通过拖拽调整优先识别顺序。</p>
        </div>
        <div class="player-grid">
          <label class="player-card qq">
            <span class="app-dot">Q</span>
            <strong>QQ音乐</strong>
            <input type="checkbox" data-setting="enableQQMusic" />
            <span class="switch"></span>
          </label>
          <label class="player-card netease">
            <span class="app-dot">云</span>
            <strong>网易云音乐</strong>
            <input type="checkbox" data-setting="enableNetease" />
            <span class="switch"></span>
          </label>
          <label class="player-card kugou">
            <span class="app-dot">K</span>
            <strong>酷狗音乐</strong>
            <input type="checkbox" data-setting="enableKugou" />
            <span class="switch"></span>
          </label>
          <label class="player-card spotify">
            <span class="app-dot">S</span>
            <strong>Spotify</strong>
            <input type="checkbox" data-setting="enableSpotify" />
            <span class="switch"></span>
          </label>
        </div>
        <div id="recognitionOrder" class="order-list" aria-label="识别顺序"></div>
      </section>

      <section id="lyrics" class="card">
        <div class="section-heading">
          <h2>歌词设置</h2>
          <p>控制歌词窗口启动行为、翻译与显示辅助项。</p>
        </div>
        <div class="setting-list">
          <label class="setting-row">
            <span><strong>启动时显示歌词</strong><small>应用启动后自动显示任务栏歌词窗口。</small></span>
            <input type="checkbox" data-setting="showLyricsOnStartup" /><span class="switch"></span>
          </label>
          <label class="setting-row">
            <span><strong>显示歌词翻译</strong><small>统一控制各歌词源的翻译显示。</small></span>
            <input type="checkbox" data-setting="showLyricTranslation" /><span class="switch"></span>
          </label>
          <label class="setting-row">
            <span><strong>显示背景</strong><small>为歌词窗口启用半透明背景。</small></span>
            <input type="checkbox" data-setting="showBackground" /><span class="switch"></span>
          </label>
          <label class="setting-row">
            <span><strong>显示边框</strong><small>为歌词窗口绘制边框，便于在深浅背景上分辨。</small></span>
            <input type="checkbox" data-setting="showBorder" /><span class="switch"></span>
          </label>
        </div>
      </section>

      <section id="appearance" class="card">
        <div class="section-heading">
          <h2>外观</h2>
          <p>调整歌词字体、字重和文字颜色。</p>
        </div>
        <div class="form-grid">
          <label>字号<input type="number" min="10" max="40" step="1" data-setting="fontSize" /></label>
          <label>字体<input type="text" data-setting="fontFamily" /></label>
          <label>字重<select data-setting="fontWeight">
            <option value="Light">细体</option>
            <option value="Normal">常规</option>
            <option value="Medium">中等</option>
            <option value="SemiBold">半粗体</option>
            <option value="Bold">粗体</option>
          </select></label>
          <label>文字颜色<input type="text" data-setting="foregroundColor" /></label>
        </div>
      </section>

      <section id="layout" class="card">
        <div class="section-heading">
          <h2>窗口设置</h2>
          <p>调整任务栏歌词窗口的位置、宽度与透明度。</p>
        </div>
        <div class="form-grid">
          <label>背景不透明度<input type="number" min="0" max="1" step="0.01" data-setting="backgroundOpacity" /></label>
          <label>窗口宽度 (px)<input type="number" min="320" max="1400" step="1" data-setting="windowWidth" /></label>
          <label>水平锚点<select data-setting="horizontalAnchor">
            <option value="Left">左侧</option>
            <option value="Center">居中</option>
            <option value="Right">右侧</option>
          </select></label>
          <label>X 偏移 (px)<input type="number" min="-2000" max="2000" step="1" data-setting="xOffset" /></label>
          <label>Y 偏移 (px)<input type="number" min="-2000" max="2000" step="1" data-setting="yOffset" /></label>
        </div>
      </section>

      <section id="debug" class="card">
        <div class="section-heading">
          <h2>数据与调试</h2>
          <p>清理缓存或打开辅助调试能力。</p>
        </div>
        <div class="setting-list">
          <label class="setting-row">
            <span><strong>SMTC 时间轴监视器</strong><small>用于观察播放器时间轴数据，排查同步问题。</small></span>
            <input type="checkbox" data-setting="enableSmtcTimelineMonitor" /><span class="switch"></span>
          </label>
          <div class="setting-row">
            <span><strong>歌词缓存</strong><small>清除后首次重新匹配会稍慢。</small></span>
            <button id="clearCacheButton" class="danger-button">清除缓存</button>
          </div>
        </div>
      </section>
    </section>
  </main>
  <div id="toast" class="toast" role="status"></div>
  <script src="./app.js"></script>
</body>
</html>
